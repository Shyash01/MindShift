<!DOCTYPE html>
<html>

<head>
<title>Login - Happiness System</title>

<style>

body{
font-family: Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
background:#eef4f3;
}

/* Login Card */

.login-box{
background:white;
padding:40px;
border-radius:12px;
width:360px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
text-align:center;
}

/* Title */

.login-box h2{
margin-bottom:25px;
}

/* Inputs */

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #d1d5db;
border-radius:6px;
font-size:14px;
}

/* Button */

button{
width:100%;
padding:12px;
background:#059669;
color:white;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#16a34a;
}

/* Register link */

.register-link{
margin-top:18px;
font-size:14px;
color:#475569;
}

.register-link a{
color:#6366f1;
text-decoration:none;
font-weight:500;
}

.register-link a:hover{
text-decoration:underline;
}

/* Error message */

#error{
color:red;
font-size:14px;
margin-top:10px;
}

</style>
</head>


<body>

<div class="login-box">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error"></p>

<p class="register-link">
New user? <a href="register.html">Create account</a>
</p>

</div>


<script>

async function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

if(!email || !password){
alert("Enter email and password");
return;
}

try{

const response = await fetch("/api/auth/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
password
})
});

const data = await response.json();

if(!response.ok){
alert(data.message || "Login failed");
return;
}

/* Store token */
localStorage.setItem("token",data.token);

/* Redirect to dashboard */
window.location.href="/index.html";

}catch(error){

console.error(error);
alert("Server error");

}

}

</script>

</body>
</html>
